<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FraudShield — Transaction Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1520;
      --surface2: #111d2e;
      --border: #1a2d45;
      --accent: #00d4ff;
      --accent2: #0090cc;
      --danger: #ff3d5a;
      --warn: #ff9d00;
      --safe: #00e5a0;
      --text: #c8ddf0;
      --text-muted: #4a6880;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.6; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-family: var(--mono);
      font-size: 1.15rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(0,229,160,0.08);
      border: 1px solid rgba(0,229,160,0.2);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--safe);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--safe);
      box-shadow: 0 0 6px var(--safe);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Layout */
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before { opacity: 1; }

    .card-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .card-title span { color: var(--accent); }

    /* Form */
    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.6rem 0.85rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }

    select option { background: #0d1520; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* Button */
    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 8px;
      color: #001820;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,212,255,0.35);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-inner {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,24,32,0.4);
      border-top-color: #001820;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result Panel */
    .result-panel {
      display: flex; flex-direction: column; gap: 1rem;
    }

    /* Risk Gauge */
    .gauge-wrapper {
      text-align: center;
      padding: 1rem 0;
    }

    .gauge-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .gauge-value {
      font-family: var(--mono);
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.5s;
    }

    .gauge-bar {
      margin: 0.75rem 0;
      height: 8px;
      background: var(--surface2);
      border-radius: 10px;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 10px;
      width: 0%;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s;
    }

    .verdict-badge {
      display: inline-flex;
      align-items: center; justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      transition: all 0.4s;
    }

    /* Analysis Details */
    .analysis-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text);
      min-height: 80px;
    }

    .analysis-box.empty {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    /* Feature Flags */
    .flags {
      display: flex; flex-direction: column; gap: 0.4rem;
    }

    .flag {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0.7rem;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 0.78rem;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .flag.red { border-color: rgba(255,61,90,0.3); background: rgba(255,61,90,0.06); }
    .flag.yellow { border-color: rgba(255,157,0,0.3); background: rgba(255,157,0,0.06); }
    .flag.green { border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.06); }

    .flag-icon { font-size: 0.85rem; flex-shrink: 0; }
    .flag-text { color: var(--text); }

    /* Log */
    .log-card { grid-column: 1 / -1; }

    .log-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 260px; overflow-y: auto; }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0.9rem;
      background: var(--surface2);
      border-radius: 7px;
      border-left: 3px solid var(--border);
      font-size: 0.78rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .log-item.fraud { border-left-color: var(--danger); }
    .log-item.legit { border-left-color: var(--safe); }

    .log-type {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: var(--border);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .log-amount { font-family: var(--mono); color: var(--text); flex: 1; }

    .log-verdict {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .log-verdict.fraud { color: var(--danger); }
    .log-verdict.legit { color: var(--safe); }

    .log-prob {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .empty-log {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
    }

    /* Feature computed badges */
    .computed {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .computed-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.75rem;
    }

    .computed-item .ci-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    .computed-item .ci-val {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
    }

    .placeholder-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      height: 100%;
      min-height: 300px;
    }

    .placeholder-icon { font-size: 3rem; opacity: 0.2; }
    .placeholder-text {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    /* Final Verdict Banner */
    .verdict-banner {
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: bannerIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes bannerIn {
      from { opacity: 0; transform: scale(0.95) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .verdict-banner.safe {
      background: rgba(0, 229, 160, 0.08);
      border: 1.5px solid rgba(0, 229, 160, 0.45);
      box-shadow: 0 0 24px rgba(0, 229, 160, 0.1);
    }

    .verdict-banner.fraud {
      background: rgba(255, 61, 90, 0.08);
      border: 1.5px solid rgba(255, 61, 90, 0.5);
      box-shadow: 0 0 24px rgba(255, 61, 90, 0.12);
      animation: bannerIn 0.5s cubic-bezier(0.16, 1, 0.3, 1), alertPulse 2s ease-in-out 0.5s infinite;
    }

    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 0 24px rgba(255, 61, 90, 0.12); }
      50%       { box-shadow: 0 0 36px rgba(255, 61, 90, 0.28); }
    }

    .verdict-banner-icon {
      font-size: 2rem;
      flex-shrink: 0;
      line-height: 1;
    }

    .verdict-banner-icon.fraud-icon {
      animation: shake 0.5s ease 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%  { transform: translateX(-4px) rotate(-5deg); }
      40%  { transform: translateX(4px) rotate(5deg); }
      60%  { transform: translateX(-3px); }
      80%  { transform: translateX(3px); }
    }

    .verdict-banner-body { flex: 1; }

    .verdict-banner-title {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.2;
    }

    .verdict-banner-title.safe  { color: var(--safe); }
    .verdict-banner-title.fraud { color: var(--danger); }

    .verdict-banner-sub {
      font-size: 0.75rem;
      margin-top: 0.3rem;
      letter-spacing: 0.03em;
    }

    .verdict-banner-sub.safe  { color: rgba(0, 229, 160, 0.7); }
    .verdict-banner-sub.fraud { color: rgba(255, 61, 90, 0.75); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">
      <h1>FRAUDSHIELD</h1>
      <p>AI Transaction Analyzer — PaySim Model</p>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      LIVE
    </div>
  </header>

  <div class="layout">

    <!-- INPUT FORM -->
    <div class="card">
      <div class="card-title">⬡ <span>Transaction Input</span></div>

      <div class="field">
        <label>Transaction Type</label>
        <select id="txType">
          <option value="TRANSFER">TRANSFER</option>
          <option value="CASH_OUT">CASH_OUT</option>
          <option value="PAYMENT" selected>PAYMENT</option>
          <option value="CASH_IN">CASH_IN</option>
          <option value="DEBIT">DEBIT</option>
        </select>
      </div>

      <div class="field">
        <label>Amount ($)</label>
        <input type="number" id="amount" placeholder="e.g. 50000" min="0" step="0.01" value="50000" />
      </div>

      <div class="two-col">
        <div class="field">
          <label>Sender Old Balance</label>
          <input type="number" id="oldBalOrg" placeholder="e.g. 200000" value="200000" min="0" />
        </div>
        <div class="field">
          <label>Sender New Balance</label>
          <input type="number" id="newBalOrg" placeholder="e.g. 150000" value="150000" min="0" />
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <label>Receiver Old Balance</label>
          <input type="number" id="oldBalDest" placeholder="e.g. 0" value="0" min="0" />
        </div>
        <div class="field">
          <label>Receiver New Balance</label>
          <input type="number" id="newBalDest" placeholder="e.g. 50000" value="50000" min="0" />
        </div>
      </div>

      <div class="field">
        <label>Step (Hour of Simulation)</label>
        <input type="number" id="step" placeholder="e.g. 1" min="1" max="744" value="100" />
      </div>

      <!-- Computed Features Preview -->
      <div class="computed" id="computedFeatures">
        <div class="computed-item">
          <div class="ci-label">Balance Error</div>
          <div class="ci-val" id="ciError">—</div>
        </div>
        <div class="computed-item">
          <div class="ci-label">Sender Drain Ratio</div>
          <div class="ci-val" id="ciSender">—</div>
        </div>
        <div class="computed-item">
          <div class="ci-label">Receiver Ratio</div>
          <div class="ci-val" id="ciReceiver">—</div>
        </div>
        <div class="computed-item">
          <div class="ci-label">Amount Cap</div>
          <div class="ci-val" id="ciCap">—</div>
        </div>
      </div>

      <button class="btn" id="analyzeBtn" onclick="analyze()">
        <div class="btn-inner" id="btnInner">
          <span>🔍</span> ANALYZE TRANSACTION
        </div>
      </button>
    </div>

    <!-- RESULT PANEL -->
    <div class="card" id="resultCard">
      <div class="card-title">⬡ <span>Risk Assessment</span></div>

      <div id="resultContent">
        <div class="placeholder-state">
          <div class="placeholder-icon">⚡</div>
          <div class="placeholder-text">AWAITING TRANSACTION DATA<br/>— ENTER DETAILS AND ANALYZE —</div>
        </div>
      </div>
    </div>

    <!-- TRANSACTION LOG -->
    <div class="card log-card">
      <div class="card-title">⬡ <span>Transaction Log</span></div>
      <div class="log-list" id="logList">
        <div class="empty-log">NO TRANSACTIONS ANALYZED YET</div>
      </div>
    </div>

  </div>
</div>

<script>
  const AMOUNT_CAP = 9999999; // Representative cap

  // Live computed features
  function updateComputed() {
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const oldOrg = parseFloat(document.getElementById('oldBalOrg').value) || 0;
    const newOrg = parseFloat(document.getElementById('newBalOrg').value) || 0;
    const oldDest = parseFloat(document.getElementById('oldBalDest').value) || 0;
    const newDest = parseFloat(document.getElementById('newBalDest').value) || 0;

    const error = (newOrg + newDest) - (oldOrg + oldDest);
    const senderRatio = amount / (oldOrg + 1);
    const receiverRatio = amount / (oldDest + 1);
    const capped = Math.min(amount, AMOUNT_CAP);

    document.getElementById('ciError').textContent = error.toFixed(2);
    document.getElementById('ciSender').textContent = senderRatio.toFixed(4);
    document.getElementById('ciReceiver').textContent = receiverRatio.toFixed(4);
    document.getElementById('ciCap').textContent = capped === amount ? 'NOT CAPPED' : capped.toFixed(0);

    // Color error
    const errEl = document.getElementById('ciError');
    errEl.style.color = Math.abs(error) > amount * 0.5 ? 'var(--danger)' : 'var(--accent)';
  }

  document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', updateComputed));
  updateComputed();

  // Fraud logs
  let logs = [];

  function renderLogs() {
    const list = document.getElementById('logList');
    if (logs.length === 0) {
      list.innerHTML = '<div class="empty-log">NO TRANSACTIONS ANALYZED YET</div>';
      return;
    }
    list.innerHTML = logs.slice().reverse().map(l => `
      <div class="log-item ${l.verdict.toLowerCase()}">
        <span class="log-type">${l.type}</span>
        <span class="log-amount">$${Number(l.amount).toLocaleString()}</span>
        <span class="log-prob">${(l.prob * 100).toFixed(1)}%</span>
        <span class="log-verdict ${l.verdict.toLowerCase()}">${l.verdict}</span>
      </div>
    `).join('');
  }

  async function analyze() {
    const btn = document.getElementById('analyzeBtn');
    const btnInner = document.getElementById('btnInner');

    const txType = document.getElementById('txType').value;
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const oldOrg = parseFloat(document.getElementById('oldBalOrg').value) || 0;
    const newOrg = parseFloat(document.getElementById('newBalOrg').value) || 0;
    const oldDest = parseFloat(document.getElementById('oldBalDest').value) || 0;
    const newDest = parseFloat(document.getElementById('newBalDest').value) || 0;
    const step = parseInt(document.getElementById('step').value) || 1;

    const error = (newOrg + newDest) - (oldOrg + oldDest);
    const senderRatio = amount / (oldOrg + 1);
    const receiverRatio = amount / (oldDest + 1);
    const cappedAmount = Math.min(amount, AMOUNT_CAP);

    btn.disabled = true;
    btnInner.innerHTML = '<div class="spinner"></div> ANALYZING...';

    const prompt = `You are a financial fraud detection AI trained on the PaySim mobile money dataset. Analyze this transaction and predict fraud probability.

Transaction details:
- Type: ${txType}
- Amount: $${cappedAmount}
- Sender old balance: $${oldOrg}
- Sender new balance: $${newOrg}
- Receiver old balance: $${oldDest}
- Receiver new balance: $${newDest}
- Step (hour): ${step}

Derived features (exactly as computed during model training):
- Balance error (newOrg + newDest - oldOrg - oldDest): ${error.toFixed(4)}
- Amount/sender_ratio (amount / oldOrg+1): ${senderRatio.toFixed(6)}
- Amount/receiver_ratio (amount / oldDest+1): ${receiverRatio.toFixed(6)}

Key fraud patterns from the training data:
- Fraud only occurs in TRANSFER and CASH_OUT transactions
- Fraudulent transactions often drain the sender account completely (senderRatio ≈ 1.0)
- Fraudulent CASH_OUTs often have extreme balance errors (receiver balance doesn't update properly)
- Fraudulent TRANSFERs often move funds to accounts with zero receiver balance
- If type is PAYMENT, CASH_IN, or DEBIT → probability should be near 0

Respond ONLY in this exact JSON format (no markdown):
{
  "probability": 0.XX,
  "verdict": "FRAUD" or "LEGIT",
  "confidence": "HIGH" or "MEDIUM" or "LOW",
  "flags": [
    {"level": "red|yellow|green", "text": "short flag description"}
  ],
  "analysis": "2-3 sentence explanation of the prediction"
}`;

    try {
      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      if (!resp.ok) {
        throw new Error(`API error: ${resp.status}`);
      }

      const result = await resp.json();
      renderResult(result, txType, cappedAmount);

      logs.push({
        type: txType,
        amount: cappedAmount,
        verdict: result.verdict,
        prob: result.probability
      });
      renderLogs();

    } catch (e) {
      document.getElementById('resultContent').innerHTML = `
        <div class="analysis-box" style="color:var(--danger); border-color: rgba(255,61,90,0.3);">
          ⚠ Analysis failed. Please try again.<br/><small style="color:var(--text-muted)">${e.message}</small>
        </div>`;
    }

    btn.disabled = false;
    btnInner.innerHTML = '<span>🔍</span> ANALYZE TRANSACTION';
  }

  function renderResult(result, txType, amount) {
    const pct = Math.round(result.probability * 100);
    const isFraud = result.verdict === 'FRAUD';

    const gaugeColor = pct >= 70 ? 'var(--danger)' : pct >= 40 ? 'var(--warn)' : 'var(--safe)';
    const verdictBg = isFraud ? 'rgba(255,61,90,0.12)' : 'rgba(0,229,160,0.10)';
    const verdictBorder = isFraud ? 'rgba(255,61,90,0.4)' : 'rgba(0,229,160,0.35)';
    const verdictColor = isFraud ? 'var(--danger)' : 'var(--safe)';
    const verdictIcon = isFraud ? '🚨' : '✅';

    const flagsHtml = (result.flags || []).map(f => `
      <div class="flag ${f.level}">
        <span class="flag-icon">${f.level === 'red' ? '🔴' : f.level === 'yellow' ? '🟡' : '🟢'}</span>
        <span class="flag-text">${f.text}</span>
      </div>
    `).join('');

    const bannerHtml = isFraud
      ? `<div class="verdict-banner fraud">
           <div class="verdict-banner-icon fraud-icon">🚨</div>
           <div class="verdict-banner-body">
             <div class="verdict-banner-title fraud">⚠ FRAUDULENT TRANSACTION DETECTED</div>
             <div class="verdict-banner-sub fraud">This transaction has been flagged as potentially fraudulent. Do not proceed.</div>
           </div>
         </div>`
      : `<div class="verdict-banner safe">
           <div class="verdict-banner-icon">✅</div>
           <div class="verdict-banner-body">
             <div class="verdict-banner-title safe">TRANSACTION IS SAFE</div>
             <div class="verdict-banner-sub safe">No fraud indicators detected. This transaction appears legitimate.</div>
           </div>
         </div>`;

    document.getElementById('resultContent').innerHTML = `
      <div class="result-panel">

        ${bannerHtml}

        <div class="gauge-wrapper">
          <div class="gauge-label">FRAUD PROBABILITY</div>
          <div class="gauge-value" style="color:${gaugeColor}">${pct}%</div>
          <div class="gauge-bar">
            <div class="gauge-fill" id="gaugeFill" style="background:${gaugeColor}"></div>
          </div>
          <div style="display:flex; justify-content:center; margin-top:0.5rem;">
            <div class="verdict-badge" style="background:${verdictBg}; border:1px solid ${verdictBorder}; color:${verdictColor};">
              ${verdictIcon} ${result.verdict} — ${result.confidence} CONFIDENCE
            </div>
          </div>
        </div>

        <div>
          <div class="card-title" style="margin-bottom:0.6rem;">⬡ <span>Risk Flags</span></div>
          <div class="flags">${flagsHtml || '<div class="flag green"><span class="flag-icon">🟢</span><span class="flag-text">No significant risk factors detected</span></div>'}</div>
        </div>

        <div>
          <div class="card-title" style="margin-bottom:0.5rem;">⬡ <span>Analysis</span></div>
          <div class="analysis-box">${result.analysis}</div>
        </div>

      </div>`;

    // Animate gauge
    setTimeout(() => {
      const fill = document.getElementById('gaugeFill');
      if (fill) fill.style.width = pct + '%';
    }, 80);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('analyzeBtn').disabled) analyze();
  });
</script>

</body>
</html>
